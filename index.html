<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>AI Image Generator</h1>
            <p>Transform your ideas into stunning visuals.</p>
        </header>

        <section class="generator-section">
            <form id="generate-form" class="input-group">
                <input 
                    type="text" 
                    id="prompt-input" 
                    placeholder="Describe what you want to see..." 
                    required 
                    autocomplete="off"
                >
                <button type="submit" id="generate-btn">
                    <span class="btn-text">Generate</span>
                    <span class="loader hidden"></span>
                </button>
            </form>
            <div id="error-message" class="error hidden"></div>
        </section>

        <section class="result-section">
            <div id="image-container" class="image-box empty">
                <div class="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="image-icon"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                    <p>Your generated image will appear here</p>
                </div>
                <img id="result-image" src="" alt="Generated artwork" class="hidden">
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
